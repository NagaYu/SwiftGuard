name: Release

# `v*` タグを push すると、配布アセットを自動ビルドして GitHub Release を作成する。
#   git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # リリース作成・アセットアップロードに必要

jobs:
  build-and-release:
    # FoundationModels は macOS 26 (Tahoe) SDK / Xcode 26 が必要。
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app || true

      - name: Build artifacts (.app / .dmg / CLI)
        # Developer ID 署名・公証を使う場合は、リポジトリ Secrets に
        # SIGN_IDENTITY / NOTARY_PROFILE 等を設定して下記へ env で渡す。
        # 未設定なら ad-hoc 署名でビルドされる。
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
          NOTARY_PROFILE: ${{ secrets.NOTARY_PROFILE }}
        run: ./scripts/build.sh all

      - name: Package CLI
        run: |
          cd dist
          zip -j "swiftguard-cli-${GITHUB_REF_NAME#v}-macos-universal.zip" swiftguard

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*.dmg \
            dist/*.zip
