name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    # FoundationModels は macOS 26 (Tahoe) SDK / Xcode 26 が必要。
    # 該当ランナーイメージが提供され次第 CI が通る。
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app || true

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
